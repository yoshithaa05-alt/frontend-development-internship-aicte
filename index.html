<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Review Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>🎬 Movie Review Platform</header>
<div class="container">
  <input type="text" id="search" placeholder="Search for a movie...">
  <button onclick="searchMovie()">Search</button>
  <div id="movies"></div>
</div>

<script>
const apiKey = "5fe273fcbd2d0edd0caff68c1369977f";

async function searchMovie() {
  const query = document.getElementById("search").value;
  if (!query) return;
  const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${apiKey}&query=${query}`);
  const data = await res.json();
  displayMovies(data.results);
}

function displayMovies(movies) {
  const moviesDiv = document.getElementById("movies");
  moviesDiv.innerHTML = "";
  movies.forEach(movie => {
    const div = document.createElement("div");
    div.className = "movie-card";
    div.innerHTML = `
      <img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" onclick="window.location.href='details.html?movieId=${movie.id}'">
      <div class="movie-details">
        <h2>${movie.title}</h2>
        <button onclick="window.location.href='details.html?movieId=${movie.id}'">View Details</button>
      </div>
    `;
    moviesDiv.appendChild(div);
  });
}
</script>
</body>
</html>
